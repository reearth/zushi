name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Allow the coverage report action to post/update its PR comment.
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build before typecheck: tests self-import the package via its
      # "@reearth/zushi" name, which only resolves once dist exists.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (node) with coverage
        run: pnpm test:coverage

      # Posts/updates a coverage comment on PRs; on push it writes to the job
      # summary. Reads ./coverage/coverage-summary.json + coverage-final.json.
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test (browser)
        run: pnpm test:browser
